<script>
// ─── PWA: Inline Manifest + Service Worker ───
(function() {
  // Generate SVG icon as data URI
  const iconSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
    <rect width="512" height="512" rx="80" fill="#080d14"/>
    <rect x="20" y="20" width="472" height="472" rx="60" fill="#0c1220" stroke="#e8922a" stroke-width="4"/>
    <text x="256" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="72" font-weight="900" fill="#e8922a" letter-spacing="8">MİHENK</text>
    <text x="256" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="36" font-weight="600" fill="#6e88a4" letter-spacing="4">TEKNİK RESİM</text>
    <line x1="100" y1="310" x2="412" y2="310" stroke="#2a4060" stroke-width="2"/>
    <rect x="120" y="330" width="272" height="8" rx="4" fill="#3a8fd4" opacity="0.6"/>
    <circle cx="256" cy="400" r="50" fill="none" stroke="#e8922a" stroke-width="4"/>
    <line x1="256" y1="355" x2="256" y2="445" stroke="#cc2222" stroke-width="1" stroke-dasharray="8,2,2,2"/>
    <line x1="211" y1="400" x2="301" y2="400" stroke="#cc2222" stroke-width="1" stroke-dasharray="8,2,2,2"/>
    <text x="256" y="410" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="700" fill="#d4dce8">⌀D</text>
  </svg>`;
  const iconBlob = new Blob([iconSVG], { type: 'image/svg+xml' });
  const iconURL = URL.createObjectURL(iconBlob);

  // Create 192px and 512px PNG icons from SVG via canvas
  function createPNGIcon(size) {
    return new Promise((resolve) => {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, 0, 0, size, size);
        resolve(canvas.toDataURL('image/png'));
      };
      img.onerror = () => resolve(null);
      img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(iconSVG);
    });
  }

  async function initPWA() {
    const icon192 = await createPNGIcon(192);
    const icon512 = await createPNGIcon(512);

    // Web App Manifest
    const manifest = {
      name: "MİHENK Teknik Resim - Kesici Takım Çizim Sistemi",
      short_name: "MİHENK TR",
      description: "Kesici takım teknik resim çizim uygulaması",
      start_url: location.href,
      scope: location.href.substring(0, location.href.lastIndexOf('/') + 1),
      display: "standalone",
      orientation: "any",
      background_color: "#080d14",
      theme_color: "#080d14",
      icons: [
        { src: icon192 || iconURL, sizes: "192x192", type: icon192 ? "image/png" : "image/svg+xml", purpose: "any maskable" },
        { src: icon512 || iconURL, sizes: "512x512", type: icon512 ? "image/png" : "image/svg+xml", purpose: "any maskable" }
      ]
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    const manifestURL = URL.createObjectURL(manifestBlob);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = manifestURL;
    document.head.appendChild(link);

    // Apple touch icon
    const appleLink = document.createElement('link');
    appleLink.rel = 'apple-touch-icon';
    appleLink.href = icon192 || iconURL;
    document.head.appendChild(appleLink);

    // Service Worker (minimal, for installability)
    const swCode = `
      const CACHE_NAME = 'mihenk-tr-v2';
      const ASSETS = [self.location.href.replace(/\\/sw\\.js.*/, '')];

      self.addEventListener('install', (e) => {
        e.waitUntil(
          caches.open(CACHE_NAME).then((cache) => {
            return cache.addAll(ASSETS).catch(() => {});
          })
        );
        self.skipWaiting();
      });

      self.addEventListener('activate', (e) => {
        e.waitUntil(
          caches.keys().then((names) => {
            return Promise.all(
              names.filter((n) => n !== CACHE_NAME).map((n) => caches.delete(n))
            );
          })
        );
        self.clients.claim();
      });

      self.addEventListener('fetch', (e) => {
        e.respondWith(
          fetch(e.request).catch(() => caches.match(e.request))
        );
      });
    `;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swURL = URL.createObjectURL(swBlob);

    if ('serviceWorker' in navigator) {
      try {
        // Try real sw.js file first (most reliable)
        await navigator.serviceWorker.register('./sw.js');
      } catch (e1) {
        try {
          // Fallback: blob-based SW
          await navigator.serviceWorker.register(swURL, { scope: location.href.substring(0, location.href.lastIndexOf('/') + 1) });
        } catch (e2) {
          console.log('SW registration skipped:', e2.message);
        }
      }
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initPWA);
  } else {
    initPWA();
  }
})();
</script>

// ─── DRAGGABLE LABEL SYSTEM ─────────────────────────────

function svgPoint(svgEl, clientX, clientY) {
  const pt = svgEl.createSVGPoint();
  pt.x = clientX; pt.y = clientY;
  return pt.matrixTransform(svgEl.getScreenCTM().inverse());
}

function Draggable({ id, offsets, setOffsets, axis, children }) {
  const off = offsets[id] || { dx: 0, dy: 0 };
  const dragRef = React.useRef(null);

  const onStart = useCallback((clientX, clientY) => {
    const svg = document.getElementById("teknik-svg");
    if (!svg) return;
    const p = svgPoint(svg, clientX, clientY);
    dragRef.current = { startX: p.x - off.dx, startY: p.y - off.dy };

    const onMove = (cx, cy) => {
      if (!dragRef.current) return;
      const mp = svgPoint(svg, cx, cy);
      const newDx = axis === "y" ? 0 : mp.x - dragRef.current.startX;
      const newDy = axis === "x" ? 0 : mp.y - dragRef.current.startY;
      setOffsets(prev => ({ ...prev, [id]: { dx: newDx, dy: newDy } }));
    };

    const onEnd = () => {
      dragRef.current = null;
      document.removeEventListener("mousemove", mmH);
      document.removeEventListener("mouseup", muH);
      document.removeEventListener("touchmove", tmH);
      document.removeEventListener("touchend", teH);
    };

    const mmH = (e) => onMove(e.clientX, e.clientY);
    const muH = () => onEnd();
    const tmH = (e) => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); };
    const teH = () => onEnd();

    document.addEventListener("mousemove", mmH);
    document.addEventListener("mouseup", muH);
    document.addEventListener("touchmove", tmH, { passive: false });
    document.addEventListener("touchend", teH);
  }, [id, off, setOffsets, axis]);

  const cursor = axis === "y" ? "ns-resize" : axis === "x" ? "ew-resize" : "move";
  return (
    <g transform={`translate(${off.dx},${off.dy})`} style={{ cursor }}
      onMouseDown={(e) => { e.stopPropagation(); onStart(e.clientX, e.clientY); }}
      onTouchStart={(e) => { e.stopPropagation(); onStart(e.touches[0].clientX, e.touches[0].clientY); }}>
      {children}
    </g>
  );
}

// ─── DIMENSION HELPERS ──────────────────────────────────

function DimH({ x1, x2, y, label, tol, side = "bottom", offset = 7, dragId, offsets, setOffsets }) {
  const dir = side === "top" ? -1 : 1;
  const yBase = y + dir * offset;
  const mid = (x1 + x2) / 2;
  const a = 2.0;
  if (Math.abs(x2 - x1) < 0.3) return null;
  const tolText = tol || "";
  // Drag offset'i oku — metin hangi tarafta olacağını belirle
  const dy = (offsets && dragId && offsets[dragId]) ? offsets[dragId].dy : 0;
  const yActual = yBase + dy;
  // Metin her zaman çizginin dış tarafında (tool'dan uzak) — dinamik
  const textDir = yActual >= y ? 1 : -1;
  const yT = yBase + textDir * 7.5;

  // Only the dim line + arrows + text is draggable (positioned at yBase, drag adds dy)
  const inner = (
    <g fill={DC} stroke={DC} strokeWidth={DS.dim}>
      <line x1={x1} y1={yBase} x2={x2} y2={yBase} />
      <polygon points={`${x1},${yBase} ${x1+a},${yBase-a*0.35} ${x1+a},${yBase+a*0.35}`} stroke="none" />
      <polygon points={`${x2},${yBase} ${x2-a},${yBase-a*0.35} ${x2-a},${yBase+a*0.35}`} stroke="none" />
      {/* Label ortada, tolerans label'ın sağında — bağımsız, kaymaz */}
      <text x={mid} y={yT} textAnchor="middle" dominantBaseline={textDir < 0 ? "auto" : "hanging"}
        fontSize={5.5} fontFamily="'IBM Plex Mono', monospace" fill={DC} stroke="none" fontWeight="700">{label}</text>
      {tolText && <text x={mid + (label.length * 3.2)} y={yT} textAnchor="start" dominantBaseline={textDir < 0 ? "auto" : "hanging"}
        fontSize={4.0} fontFamily="'IBM Plex Mono', monospace" fill="#cc0000" stroke="none" fontWeight="700">{tolText}</text>}
    </g>
  );

  return (
    <g>
      {/* Extension lines: always reach from tool edge to dim line — never detach */}
      <line x1={x1} y1={y} x2={x1} y2={yActual + dir * 2} stroke={DC} strokeWidth={DS.dim} fill="none" />
      <line x1={x2} y1={y} x2={x2} y2={yActual + dir * 2} stroke={DC} strokeWidth={DS.dim} fill="none" />
      {dragId && offsets && setOffsets
        ? <Draggable id={dragId} offsets={offsets} setOffsets={setOffsets} axis="y">{inner}</Draggable>
        : inner}
    </g>
  );
}

function DimV({ y1, y2, x, label, tol, side = "left", offset = 6, dragId, offsets, setOffsets }) {
  const dir = side === "left" ? -1 : 1;
  const xBase = x + dir * offset;
  const dx = (offsets && dragId && offsets[dragId]) ? offsets[dragId].dx : 0;
  const xActual = xBase + dx;
  const mid = (y1 + y2) / 2;
  const a = 2.0;
  if (Math.abs(y2 - y1) < 0.3) return null;
  const tolText = tol || "";
  const xT = xBase + dir * 7;

  const inner = (
    <g fill={DC} stroke={DC} strokeWidth={DS.dim}>
      <line x1={xBase} y1={y1} x2={xBase} y2={y2} />
      <polygon points={`${xBase},${y1} ${xBase-a*0.35},${y1+a} ${xBase+a*0.35},${y1+a}`} stroke="none" />
      <polygon points={`${xBase},${y2} ${xBase-a*0.35},${y2-a} ${xBase+a*0.35},${y2-a}`} stroke="none" />
      {/* Label ortada, tolerans label'ın sağında — rotate grubunda bağımsız */}
      <text x={xT} y={mid} textAnchor="middle" dominantBaseline="central"
        fontSize={5.5} fontFamily="'IBM Plex Mono', monospace" fill={DC} stroke="none" fontWeight="700"
        transform={`rotate(-90, ${xT}, ${mid})`}>{label}</text>
      {tolText && <text x={xT + (label.length * 3.2)} y={mid} textAnchor="start" dominantBaseline="central"
        fontSize={4.0} fontFamily="'IBM Plex Mono', monospace" fill="#cc0000" stroke="none" fontWeight="700"
        transform={`rotate(-90, ${xT + (label.length * 3.2)}, ${mid})`}>{tolText}</text>}
    </g>
  );

  return (
    <g>
      {/* Extension lines: always reach from tool edge to dim line — never detach */}
      <line x1={x} y1={y1} x2={xActual + dir * 2} y2={y1} stroke={DC} strokeWidth={DS.dim} fill="none" />
      <line x1={x} y1={y2} x2={xActual + dir * 2} y2={y2} stroke={DC} strokeWidth={DS.dim} fill="none" />
      {dragId && offsets && setOffsets
        ? <Draggable id={dragId} offsets={offsets} setOffsets={setOffsets} axis="x">{inner}</Draggable>
        : inner}
    </g>
  );
}

// ISO-style angle annotation: corner + two lines + arc + text (Image 3 reference style)
// flip=false → lines go RIGHT (taper goes right from corner, e.g. shaft→neck)
// flip=true  → lines go LEFT  (taper goes left from corner, e.g. drill tip, stepdrill)
// ArcAngleDim — ISO tarzı açı annotasyonu (iki çizgi + yay + metin)
// Tüm çizgiler köşe noktasından DIŞ TARAFA uzanır.
//
// refDir: referans çizgisinin yönü (+1=sağ, -1=sol)
// below:  true  → yay AŞAĞI açılır (+y, takım dışına) — geçiş köşelerinde kullan
//         false → yay YUKARI açılır (-y, takım dışına) — uç noktalarında kullan
function ArcAngleDim({ cx, cy, aRad, label, arcR = 12, lineLen = 20, refDir = -1, below = true, id, offsets, setOffsets }) {
  const yDir = below ? 1 : -1;
  const sweep = below ? 1 : 0;   // CW=1(aşağı açık), CCW=0(yukarı açık)

  // Referans çizgisi: yatay, refDir yönünde
  const l1x = cx + refDir * lineLen, l1y = cy;
  // Açı çizgisi: refDir yönünde + yDir yönünde eğimli
  const l2x = cx + refDir * lineLen * Math.cos(aRad);
  const l2y = cy + yDir  * lineLen * Math.sin(aRad);
  // Yay noktaları
  const aSx = cx + refDir * arcR, aSy = cy;
  const aEx = cx + refDir * arcR * Math.cos(aRad);
  const aEy = cy + yDir  * arcR  * Math.sin(aRad);
  // Metin: yay orta açısı yönünde, yayın hemen dışında
  const textX = cx + refDir * (arcR + 8) * Math.cos(aRad / 2);
  const textY = cy + yDir  * (arcR + 8) * Math.sin(aRad / 2);

  const inner = (
    <g fill="none" stroke="#e65100" strokeWidth={0.8}>
      <line x1={cx} y1={cy} x2={l1x} y2={l1y} />
      <line x1={cx} y1={cy} x2={l2x} y2={l2y} />
      <path d={`M ${aSx} ${aSy} A ${arcR} ${arcR} 0 0 ${sweep} ${aEx} ${aEy}`} />
      <text x={textX} y={textY} textAnchor="middle" dominantBaseline="central"
        fontSize={6.5} fontFamily="'IBM Plex Mono', monospace" fill="#e65100" stroke="none" fontWeight="800">
        {label}
      </text>
    </g>
  );

  if (id && offsets && setOffsets) return <Draggable id={id} offsets={offsets} setOffsets={setOffsets}>{inner}</Draggable>;
  return inner;
}

// TipAngleDim — Uç açısı için simetrik annotasyon (uç.jpg referansı)
// İki çizgi tip noktasından sola: biri sol-yukarı, diğeri sol-aşağı. Aralarında yay + metin.
function TipAngleDim({ cx, cy, halfRad, label, arcR = 10, lineLen = 16, id, offsets, setOffsets }) {
  // Üst çizgi: sol-yukarı (taper üst yüzeyi boyunca)
  const l1x = cx - lineLen * Math.cos(halfRad), l1y = cy - lineLen * Math.sin(halfRad);
  // Alt çizgi: sol-aşağı (taper alt yüzeyi boyunca, simetrik)
  const l2x = cx - lineLen * Math.cos(halfRad), l2y = cy + lineLen * Math.sin(halfRad);
  // Yay: üst çizgiden alt çizgiye (CW)
  const aSx = cx - arcR * Math.cos(halfRad), aSy = cy - arcR * Math.sin(halfRad);
  const aEx = cx - arcR * Math.cos(halfRad), aEy = cy + arcR * Math.sin(halfRad);
  // Metin: tip noktasının sağında
  const textX = cx + arcR + 8;
  const textY = cy;

  const inner = (
    <g fill="none" stroke="#e65100" strokeWidth={0.8}>
      <line x1={cx} y1={cy} x2={l1x} y2={l1y} />
      <line x1={cx} y1={cy} x2={l2x} y2={l2y} />
      <path d={`M ${aSx} ${aSy} A ${arcR} ${arcR} 0 0 1 ${aEx} ${aEy}`} />
      <text x={textX} y={textY} textAnchor="middle" dominantBaseline="central"
        fontSize={6.5} fontFamily="'IBM Plex Mono', monospace" fill="#e65100" stroke="none" fontWeight="800">
        {label}
      </text>
    </g>
  );
  if (id && offsets && setOffsets) return <Draggable id={id} offsets={offsets} setOffsets={setOffsets}>{inner}</Draggable>;
  return inner;
}

function CL({ x1, y1, x2, y2 }) {
  return <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={DS.center} strokeWidth={DS.cW} strokeDasharray="8,2,2,2" />;
}


function SideView({ params, ox, oy, scale, dimOff, setDimOff }) {
  let { D, d, L, l1, l2, z, helix, toolType, rCorner, chamferSize, dCore, neckDia, neckAngle, cutNeckAngle } = params;
  cutNeckAngle = cutNeckAngle ?? 90;

  // For stepdrill: override l1 from steps, disable neck
  if (toolType === "stepdrill") {
    const stps = params.steps || [];
    l1 = stps.reduce((sum, st) => sum + (st.len || 0), 0);
    l2 = 0;
    D = stps.length > 0 ? Math.max(...stps.map(s => s.dia)) : D;
  }

  const s = scale;
  const hD = (D / 2) * s;
  const hd = (d / 2) * s;
  const tL = L * s;
  const cL = l1 * s;
  const nL = l2 * s;
  const cR = (dCore / 2) * s;
  const coR = rCorner * s;

  // Neck diameter from user param
  const nD = l2 > 0 ? neckDia : D;
  const hN = (nD / 2) * s;

  // Transition zone 1: şaft → boğaz (sol taraf)
  const aRad = (neckAngle * Math.PI) / 180;
  const transDx = (l2 > 0 && d > nD) ? ((d - nD) / 2) / Math.tan(aRad) * s : 0;

  // Transition zone 2: boğaz → kesici (sağ taraf) — YENİ
  const cutAngleRad = (cutNeckAngle * Math.PI) / 180;
  const cutTransDx = (l2 > 0 && D > nD && cutNeckAngle < 89.5)
    ? ((D - nD) / 2) / Math.tan(cutAngleRad) * s
    : 0;

  // Layout: sLeft──[shank]──sRight──[transDx]──tRight──[neck l2]──nRight──[cutTransDx]──cLeft──[cutting l1]──tipR
  const sL = tL - cL - nL - transDx - cutTransDx;
  const sLeft = ox - tL / 2;
  const sRight = sLeft + Math.max(sL, 0);
  const tRight = sRight + transDx;   // end of şaft→boğaz transition
  const nRight = tRight + nL;        // end of neck
  const cLeft0 = nRight + cutTransDx; // actual cutting start (after boğaz→kesici taper)
  const tipR = sLeft + tL;

  const e = [];

  // ── Shank ──
  if (sL > 0.3) {
    e.push(
      <rect key="shank-fill" x={sLeft} y={oy - hd} width={Math.max(sL, 0)} height={hd * 2} fill="url(#gShank)" stroke="none" filter="url(#shadow)" />,
      <rect key="shank" x={sLeft} y={oy - hd} width={Math.max(sL, 0)} height={hd * 2} fill="none" stroke={DS.outline} strokeWidth={DS.oW} />
    );
  }

  // ── Angled transition zone (outside l2) ──
  if (l2 > 0 && transDx > 0.3) {
    // Transition fill
    const transFill = `M ${sRight} ${oy - hd} L ${tRight} ${oy - hN} L ${tRight} ${oy + hN} L ${sRight} ${oy + hd} Z`;
    e.push(<path key="tp-fill" d={transFill} fill="url(#gNeck)" stroke="none" />);
    e.push(
      <line key="tp-t" x1={sRight} y1={oy - hd} x2={tRight} y2={oy - hN} stroke={DS.outline} strokeWidth={DS.oW} />,
      <line key="tp-b" x1={sRight} y1={oy + hd} x2={tRight} y2={oy + hN} stroke={DS.outline} strokeWidth={DS.oW} />
    );

    // Angle annotation — ISO arc style
    if (params.showDimAngles) {
      e.push(
        <ArcAngleDim key="ang-lbl" cx={sRight} cy={oy + hd} aRad={aRad}
          label={`${neckAngle}°`} refDir={-1} below={true}
          id="ang-lbl" offsets={dimOff} setOffsets={setDimOff} />
      );
    }
  } else if (l2 > 0 && Math.abs(hd - hN) > 0.2) {
    // 90° step if no meaningful angle
    e.push(
      <line key="sn-t" x1={sRight} y1={oy - hd} x2={sRight} y2={oy - hN} stroke={DS.outline} strokeWidth={DS.oW} />,
      <line key="sn-b" x1={sRight} y1={oy + hd} x2={sRight} y2={oy + hN} stroke={DS.outline} strokeWidth={DS.oW} />
    );
  }

  // ── Neck (pure l2, straight rectangle) ──
  if (l2 > 0 && nL > 0.3) {
    e.push(
      <rect key="nk-fill" x={tRight} y={oy - hN} width={nL} height={hN * 2} fill="url(#gNeck)" stroke="none" filter="url(#shadow)" />,
      <rect key="nk" x={tRight} y={oy - hN} width={nL} height={hN * 2} fill="none" stroke={DS.outline} strokeWidth={DS.oW} />
    );
  }

  // ── Cutting section ──
  const cLeft = cLeft0;
  const isDrill = toolType === "drill" || toolType === "stepdrill";
  let tipDrillDx = 0; // matkap uç uzunluğu — ölçü hattı hesabında kullanılır

  if (toolType === "stepdrill") {
    // ── Step Drill: Step 1 (smallest) at TIP (right), larger steps toward SHANK (left) ──
    const stps = params.steps || [];
    if (stps.length > 0) {
      const maxHR = (stps[stps.length - 1]?.dia || D) / 2 * s;

      // Build from RIGHT to LEFT: tipR is the drill point
      let curX = tipR; // start at rightmost point

      // Step 0 = smallest = drill tip (rightmost)
      const st0 = stps[0];
      const hr0 = (st0.dia / 2) * s;
      const stepL0 = st0.len * s;
      const ptAng0 = (st0.angle || 140) * Math.PI / 180;
      const tipDx0 = hr0 / Math.tan(ptAng0 / 2);

      // Drill tip V-point at right end — fill first
      const tipFill = `M ${curX - tipDx0} ${oy - hr0} L ${curX} ${oy} L ${curX - tipDx0} ${oy + hr0} Z`;
      e.push(<path key="stp-tip-fill" d={tipFill} fill="url(#gTip)" stroke="none" opacity={0.6} />);
      e.push(<path key="stp-tip" d={`M ${curX - tipDx0} ${oy - hr0} L ${curX} ${oy} L ${curX - tipDx0} ${oy + hr0}`}
        fill="none" stroke={DS.outline} strokeWidth={DS.oW} />);

      // Point angle annotation — simetrik uç açısı (TipAngleDim)
      if (params.showDimAngles) {
        const halfRad0 = ptAng0 / 2;
        const aR = Math.min(hr0 * 0.6, 10), lL = Math.min(hr0 * 1.0, 16);
        e.push(
          <TipAngleDim key="stp-pa0" cx={curX} cy={oy} halfRad={halfRad0}
            label={`${st0.angle}°`} arcR={aR} lineLen={lL}
            id="stp-pa0" offsets={dimOff} setOffsets={setDimOff} />
        );
      }

      // Body of first step (leftward from tip) — fill + outline
      const body0Right = curX - tipDx0;
      const body0Left = curX - stepL0;
      if (body0Right > body0Left) {
        e.push(
          <rect key="stp0-fill" x={body0Left} y={oy - hr0} width={body0Right - body0Left} height={hr0 * 2} fill="url(#gCut)" stroke="none" filter="url(#shadow)" />,
          <line key="stp0-t" x1={body0Left} y1={oy - hr0} x2={body0Right} y2={oy - hr0} stroke={DS.outline} strokeWidth={DS.oW} />,
          <line key="stp0-b" x1={body0Left} y1={oy + hr0} x2={body0Right} y2={oy + hr0} stroke={DS.outline} strokeWidth={DS.oW} />
        );
      }

      // Dim step 0 — length with mm (uç açısı hariç, sadece silindirik kısım)
      e.push(<DimH key="dst0" x1={body0Left} x2={body0Right} y={oy - maxHR} label={`${st0.len} mm`} tol={st0.tolLen} side="top" offset={5} dragId="dst0" offsets={dimOff} setOffsets={setDimOff} />);
      e.push(<DimV key="dsd0" y1={oy - hr0} y2={oy + hr0} x={curX} label={`⌀${st0.dia}`} tol={st0.tolDia} side="right" offset={35} dragId="dsd0" offsets={dimOff} setOffsets={setDimOff} />);

      let prevHR = hr0;
      curX = body0Left;

      // Subsequent steps (going leftward, each larger)
      for (let si = 1; si < stps.length; si++) {
        const st = stps[si];
        const hr = (st.dia / 2) * s;
        const stepL = st.len * s;
        const ptAng = (st.angle || 90) * Math.PI / 180;
        const transH = (hr - prevHR);
        const transDx = transH / Math.tan(ptAng / 2);

        // Angled transition fill
        const transFillPath = `M ${curX} ${oy - prevHR} L ${curX - transDx} ${oy - hr} L ${curX - transDx} ${oy + hr} L ${curX} ${oy + prevHR} Z`;
        e.push(<path key={`stf-${si}`} d={transFillPath} fill="url(#gCut)" stroke="none" opacity={0.7} />);

        // Angled transition (expanding leftward)
        e.push(
          <line key={`strans-t-${si}`} x1={curX} y1={oy - prevHR} x2={curX - transDx} y2={oy - hr} stroke={DS.outline} strokeWidth={DS.oW} />,
          <line key={`strans-b-${si}`} x1={curX} y1={oy + prevHR} x2={curX - transDx} y2={oy + hr} stroke={DS.outline} strokeWidth={DS.oW} />
        );

        // Angle annotation — köşe taper'ın sol-alt ucu (düz takımdaki sRight gibi)
        if (params.showDimAngles) {
          e.push(
            <ArcAngleDim key={`spa-${si}`} cx={curX - transDx} cy={oy + hr} aRad={ptAng / 2}
              label={`${st.angle}°`} refDir={-1} below={true}
              id={`spa-${si}`} offsets={dimOff} setOffsets={setDimOff} />
          );
        }

        // Step body fill + outline
        const bodyRight = curX - transDx;
        const bodyLeft = curX - stepL;
        e.push(
          <rect key={`stpf-${si}`} x={bodyLeft} y={oy - hr} width={bodyRight - bodyLeft} height={hr * 2} fill="url(#gCut)" stroke="none" filter="url(#shadow)" />,
          <line key={`stp-t-${si}`} x1={bodyLeft} y1={oy - hr} x2={bodyRight} y2={oy - hr} stroke={DS.outline} strokeWidth={DS.oW} />,
          <line key={`stp-b-${si}`} x1={bodyLeft} y1={oy + hr} x2={bodyRight} y2={oy + hr} stroke={DS.outline} strokeWidth={DS.oW} />
        );

        // Close left side of last step (connects to shank/neck)
        if (si === stps.length - 1) {
          e.push(
            <line key={`stp-l-${si}`} x1={bodyLeft} y1={oy - hr} x2={bodyLeft} y2={oy + hr} stroke={DS.outline} strokeWidth={DS.oW * 0.3} strokeDasharray="1,1" />
          );
        }

        // Dims with mm
        e.push(<DimH key={`dst${si}`} x1={bodyLeft} x2={curX} y={oy - maxHR} label={`${st.len} mm`} tol={st.tolLen} side="top" offset={5 + si * 7} dragId={`dst${si}`} offsets={dimOff} setOffsets={setDimOff} />);
        e.push(<DimV key={`dsd${si}`} y1={oy - hr} y2={oy + hr} x={(bodyLeft + bodyRight) / 2} label={`⌀${st.dia}`} tol={st.tolDia} side="left" offset={5} dragId={`dsd${si}`} offsets={dimOff} setOffsets={setDimOff} />);

        prevHR = hr;
        curX = bodyLeft;
      }
    }

  } else if (toolType === "drill") {
    // ── Standard Drill: body + V-tip ──
    const ptAng = (params.pointAngle || 140) * Math.PI / 180;
    const tipDx = hD / Math.tan(ptAng / 2);
    tipDrillDx = tipDx; // ölçü hattı için kaydet

    // Fill body + tip as one path
    const drillFill = `M ${cLeft} ${oy - hD} L ${tipR - tipDx} ${oy - hD} L ${tipR} ${oy} L ${tipR - tipDx} ${oy + hD} L ${cLeft} ${oy + hD} Z`;
    e.push(<path key="drill-fill" d={drillFill} fill="url(#gCut)" stroke="none" filter="url(#shadow)" />);
    // Tip highlight
    e.push(<path key="drill-tip-hl" d={`M ${tipR - tipDx} ${oy - hD} L ${tipR} ${oy} L ${tipR - tipDx} ${oy + hD} Z`}
      fill="url(#gTip)" stroke="none" opacity={0.5} />);

    // Drill point (V shape) outline
    e.push(<path key="drill-tip" d={`M ${tipR - tipDx} ${oy - hD} L ${tipR} ${oy} L ${tipR - tipDx} ${oy + hD}`}
      fill="none" stroke={DS.outline} strokeWidth={DS.oW} />);

    // Body outlines
    e.push(
      <line key="drill-t" x1={cLeft} y1={oy - hD} x2={tipR - tipDx} y2={oy - hD} stroke={DS.outline} strokeWidth={DS.oW} />,
      <line key="drill-b" x1={cLeft} y1={oy + hD} x2={tipR - tipDx} y2={oy + hD} stroke={DS.outline} strokeWidth={DS.oW} />
    );

    // Chisel edge
    const chiselW = hD * 0.15;
    e.push(
      <line key="chisel" x1={tipR - chiselW} y1={oy - chiselW * 0.6} x2={tipR - chiselW} y2={oy + chiselW * 0.6}
        stroke={DS.outline} strokeWidth={DS.oW * 0.7} />
    );

    // Point angle annotation — simetrik uç açısı
    if (params.showDimAngles) {
      const halfRad = ((params.pointAngle || 140) / 2) * Math.PI / 180;
      const aR = Math.min(hD * 0.6, 10), lL = Math.min(hD * 1.0, 16);
      e.push(
        <TipAngleDim key="pt-ang" cx={tipR} cy={oy} halfRad={halfRad}
          label={`${params.pointAngle}°`} arcR={aR} lineLen={lL}
          id="pt-ang" offsets={dimOff} setOffsets={setDimOff} />
      );
    }

    // Close left side
    e.push(
      <line key="drill-l" x1={cLeft} y1={oy - hD} x2={cLeft} y2={oy + hD} stroke={DS.outline} strokeWidth={DS.oW * 0.3} strokeDasharray="1,1" />
    );

  } else if (toolType === "ballnose") {
    const cutD = `M ${cLeft} ${oy - hD} L ${tipR - hD} ${oy - hD} A ${hD} ${hD} 0 0 1 ${tipR - hD} ${oy + hD} L ${cLeft} ${oy + hD} Z`;
    e.push(<path key="cut-fill" d={cutD} fill="url(#gCut)" stroke="none" filter="url(#shadow)" />);
    e.push(<path key="cut" d={cutD} fill="none" stroke={DS.outline} strokeWidth={DS.oW} />);
  } else if (toolType === "bullnose" && coR > 0) {
    const cutD = `M ${cLeft} ${oy - hD} L ${tipR - coR} ${oy - hD} A ${coR} ${coR} 0 0 1 ${tipR} ${oy - hD + coR} L ${tipR} ${oy + hD - coR} A ${coR} ${coR} 0 0 1 ${tipR - coR} ${oy + hD} L ${cLeft} ${oy + hD} Z`;
    e.push(<path key="cut-fill" d={cutD} fill="url(#gCut)" stroke="none" filter="url(#shadow)" />);
    e.push(<path key="cut" d={cutD} fill="none" stroke={DS.outline} strokeWidth={DS.oW} />);
  } else if (toolType === "chamfer" && chamferSize > 0) {
    const cs = chamferSize * s;
    const cutD = `M ${cLeft} ${oy - hD} L ${tipR - cs} ${oy - hD} L ${tipR} ${oy - hD + cs} L ${tipR} ${oy + hD - cs} L ${tipR - cs} ${oy + hD} L ${cLeft} ${oy + hD} Z`;
    e.push(<path key="cut-fill" d={cutD} fill="url(#gCut)" stroke="none" filter="url(#shadow)" />);
    e.push(<path key="cut" d={cutD} fill="none" stroke={DS.outline} strokeWidth={DS.oW} />);
  } else {
    e.push(
      <rect key="cut-fill" x={cLeft} y={oy - hD} width={cL} height={hD * 2} fill="url(#gCut)" stroke="none" filter="url(#shadow)" />,
      <rect key="cut" x={cLeft} y={oy - hD} width={cL} height={hD * 2} fill="none" stroke={DS.outline} strokeWidth={DS.oW} />
    );
  }

  // ── Boğaz → Kesici geçiş (sağ taraf) ──
  if (l2 > 0 && D > nD) {
    if (cutTransDx > 0.3) {
      // Konik geçiş fill
      const cutTransFill = `M ${nRight} ${oy - hN} L ${cLeft} ${oy - hD} L ${cLeft} ${oy + hD} L ${nRight} ${oy + hN} Z`;
      e.push(<path key="ct-fill" d={cutTransFill} fill="url(#gCut)" stroke="none" opacity={0.85} />);
      e.push(
        <line key="ct-t" x1={nRight} y1={oy - hN} x2={cLeft} y2={oy - hD} stroke={DS.outline} strokeWidth={DS.oW} />,
        <line key="ct-b" x1={nRight} y1={oy + hN} x2={cLeft} y2={oy + hD} stroke={DS.outline} strokeWidth={DS.oW} />
      );
      // Açı annotasyonu — ISO arc style
      if (params.showDimAngles) {
        e.push(
          <ArcAngleDim key="ct-ang-lbl" cx={cLeft} cy={oy + hD} aRad={cutAngleRad}
            label={`${cutNeckAngle}°`} refDir={1} below={true}
            id="ct-ang-lbl" offsets={dimOff} setOffsets={setDimOff} />
        );
      }
    } else {
      // 90° step (cutNeckAngle = 90 veya D ≈ nD)
      e.push(
        <line key="cn-t" x1={nRight} y1={oy - hN} x2={nRight} y2={oy - hD} stroke={DS.outline} strokeWidth={DS.oW} />,
        <line key="cn-b" x1={nRight} y1={oy + hN} x2={nRight} y2={oy + hD} stroke={DS.outline} strokeWidth={DS.oW} />
      );
    }
  } else if (l2 === 0 && Math.abs(hD - hd) > 0.2) {
    e.push(
      <line key="cs-t" x1={sRight} y1={oy - hd} x2={sRight} y2={oy - hD} stroke={DS.outline} strokeWidth={DS.oW} />,
      <line key="cs-b" x1={sRight} y1={oy + hd} x2={sRight} y2={oy + hD} stroke={DS.outline} strokeWidth={DS.oW} />
    );
  }

  // ── Helix / flute lines (skip step drill which has its own geometry) ──
  if (helix > 0 && z > 0 && toolType !== "stepdrill") {
    const hRad = (helix * Math.PI) / 180;
    const fluteCount = z;
    const helixPitch = (Math.PI * D * s) / Math.tan(hRad);
    const lineSpacing = helixPitch / fluteCount;
    const isLeftHand = params.helixHand === "Sol";

    for (let i = -fluteCount * 2; i < Math.ceil(cL / (lineSpacing || 1)) + fluteCount * 2; i++) {
      const startX = cLeft + i * lineSpacing;
      const dx = (hD * 2) / Math.tan(hRad);
      const lx1 = startX;
      // Left hand: lines go opposite direction (top-right to bottom-left)
      const ly1 = isLeftHand ? oy + hD : oy - hD;
      const lx2 = startX + dx;
      const ly2 = isLeftHand ? oy - hD : oy + hD;

      if (lx2 < cLeft || lx1 > tipR) continue;
      const clipX1 = Math.max(cLeft, Math.min(tipR, lx1));
      const clipX2 = Math.max(cLeft, Math.min(tipR, lx2));
      if (Math.abs(clipX2 - clipX1) < 0.3) continue;

      const t1 = dx > 0 ? (clipX1 - lx1) / dx : 0;
      const t2 = dx > 0 ? (clipX2 - lx1) / dx : 1;
      const clipY1 = ly1 + t1 * (ly2 - ly1);
      const clipY2 = ly1 + t2 * (ly2 - ly1);

      e.push(
        <line key={`hx-${i}`}
          x1={clipX1} y1={clipY1} x2={clipX2} y2={clipY2}
          stroke={params.colFlute} strokeWidth={0.6} opacity={0.45} />
      );
    }

    // (Helis açısı görselden kaldırıldı)
  }

  // ── Core hidden lines ──
  if (dCore > 0 && dCore < D) {
    e.push(
      <line key="cr-t" x1={cLeft} y1={oy - cR} x2={tipR} y2={oy - cR} stroke={DS.hidden} strokeWidth={DS.hW} strokeDasharray="2,1.5" />,
      <line key="cr-b" x1={cLeft} y1={oy + cR} x2={tipR} y2={oy + cR} stroke={DS.hidden} strokeWidth={DS.hW} strokeDasharray="2,1.5" />
    );
  }

  // ── Center line ──
  e.push(<CL key="cl" x1={sLeft - 4} y1={oy} x2={tipR + 4} y2={oy} />);

  // ── DIMENSIONS (respect show/hide toggles) ──
  const dimBase = oy + Math.max(hD, hd);

  // Total L — use dimBase (spans full tool width), larger offset to clear all other dims
  if (params.showDimL) {
    const lOffset = toolType === "stepdrill"
      ? 6 + (params.steps || []).length * 7 + 7
      : l2 > 0 ? 20 : 14;
    e.push(<DimH key="dL" x1={sLeft} x2={tipR} y={dimBase} label={`${L} mm`} tol={params.tolL} side="bottom" offset={lOffset} dragId="dL" offsets={dimOff} setOffsets={setDimOff} />);
  }

  // Cutting l1 (skip for stepdrill) — use oy+hD as y base (cutting section edge only)
  if (toolType !== "stepdrill" && params.showDiml1) {
    const l1x2 = toolType === "drill" ? tipR - tipDrillDx : tipR;
    e.push(<DimH key="dl1" x1={cLeft} x2={l1x2} y={oy + hD} label={`${l1} mm`} tol={params.toll1} side="bottom" offset={6} dragId="dl1" offsets={dimOff} setOffsets={setDimOff} />);
  }
  // Neck l2 (only the straight part) — larger top offset to clear angle annotations
  if (l2 > 0 && params.showDiml2) {
    e.push(<DimH key="dl2" x1={tRight} x2={nRight} y={oy - Math.max(hD, hd)} label={`${l2} mm`} tol={params.toll2} side="top" offset={12} dragId="dl2" offsets={dimOff} setOffsets={setDimOff} />);
  }
  // Cutting diameter (skip for stepdrill)
  if (toolType !== "stepdrill" && params.showDimD) {
    e.push(<DimV key="dD" y1={oy - hD} y2={oy + hD} x={tipR} label={`⌀${D}`} tol={params.tolD} side="right" offset={5} dragId="dD" offsets={dimOff} setOffsets={setDimOff} />);
  }
  // Shank diameter if different
  if (Math.abs(D - d) > 0.1 && params.showDimd) {
    e.push(<DimV key="dd" y1={oy - hd} y2={oy + hd} x={sLeft} label={`⌀${d}`} tol={params.told} side="left" offset={5} dragId="dd" offsets={dimOff} setOffsets={setDimOff} />);
  }
  // Neck diameter
  if (l2 > 0 && params.showDimNeck) {
    e.push(<DimV key="dN" y1={oy - hN} y2={oy + hN} x={tRight + nL / 2} label={`⌀${nD}`} tol={params.tolNeck} side="left" offset={5} dragId="dN" offsets={dimOff} setOffsets={setDimOff} />);
  }
  // Corner R
  if (toolType === "bullnose" && rCorner > 0 && params.showDimAngles) {
    e.push(<Draggable id="dR" offsets={dimOff} setOffsets={setDimOff}><text key="dR" x={tipR - coR * 0.3} y={oy + hD + 5} fontSize={5.5} fontFamily="'IBM Plex Mono', monospace" fill={DC} fontWeight="700">R{rCorner}</text></Draggable>);
  }


  return <g>{e}</g>;
}

// ─── END VIEW (bigger, bolder) ──────────────────────────

function EndView({ params, cx, cy, R }) {
  const { D, dCore, z, coolantHole, coolantCount, cutDir, toolType } = params;
  const coreR = (dCore / D) * R;
  const dirMul = cutDir === "Sol" ? -1 : 1;
  const e = [];

  // Determine which photo to use based on tool type
  const isDrill = toolType === "drill" || toolType === "stepdrill";
  // Select photo based on tool type and flute count
  let photoSrc = IMG_FREZE; // default 4Z
  if (isDrill) photoSrc = IMG_MATKAP;
  else if (toolType === "flat" && z === 3) photoSrc = IMG_ALU3Z;
  else if (toolType === "bullnose") photoSrc = IMG_RADIUS;
  else if (toolType === "ballnose") photoSrc = IMG_KURE;
  else if (toolType === "flat" || toolType === "chamfer") photoSrc = IMG_FREZE;
  const clipId = `endClip-${cx.toFixed(0)}`;

  // Clip path for circular photo
  e.push(
    <defs key="clip-def">
      <clipPath id={clipId}>
        <circle cx={cx} cy={cy} r={R * 0.98} />
      </clipPath>
    </defs>
  );

  // Photo background (clipped to circle)
  e.push(
    <image key="photo-bg" href={photoSrc}
      x={cx - R * 1.02} y={cy - R * 1.02} width={R * 2.04} height={R * 2.04}
      clipPath={`url(#${clipId})`} preserveAspectRatio="xMidYMid slice"
      opacity={0.85} />
  );

  // Outer circle border
  e.push(<circle key="out" cx={cx} cy={cy} r={R} fill="none" stroke={DS.outline} strokeWidth={DS.oW * 2} />);

  // Coolant holes (on top of photo)
  if (coolantHole && coolantCount > 0) {
    const coolR = R * 0.1;
    const coolDist = R * 0.55;
    for (let i = 0; i < coolantCount; i++) {
      const a = (i * 2 * Math.PI) / coolantCount - Math.PI / 2;
      e.push(
        <circle key={`clbg-${i}`} cx={cx + coolDist * Math.cos(a)} cy={cy + coolDist * Math.sin(a)} r={coolR + 0.5}
          fill="rgba(0,0,0,0.4)" stroke="none" />,
        <circle key={`cl-${i}`} cx={cx + coolDist * Math.cos(a)} cy={cy + coolDist * Math.sin(a)} r={coolR}
          fill="#b8dce8" stroke={DS.outline} strokeWidth={DS.oW * 1.5} />
      );
    }
  }

  // Center marks
  e.push(
    <CL key="ch" x1={cx - R - 5} y1={cy} x2={cx + R + 5} y2={cy} />,
    <CL key="cv" x1={cx} y1={cy - R - 5} x2={cx} y2={cy + R + 5} />
  );

  // Rotation direction arrow
  {
    const arR = R + 3;
    const aStart = dirMul > 0 ? -0.3 : 0.3;
    const aEnd = dirMul > 0 ? 1.0 : -1.0;
    const sx = cx + arR * Math.cos(aStart);
    const sy = cy + arR * Math.sin(aStart);
    const ex = cx + arR * Math.cos(aEnd);
    const ey = cy + arR * Math.sin(aEnd);
    const aw = 1.5;
    const aAng = aEnd + dirMul * 0.15;
    e.push(
      <path key="rot-arc" d={`M ${sx} ${sy} A ${arR} ${arR} 0 0 ${dirMul > 0 ? 1 : 0} ${ex} ${ey}`}
        fill="none" stroke="#888" strokeWidth={0.3} />,
      <polygon key="rot-arrow" points={`${ex},${ey} ${cx + (arR - aw) * Math.cos(aAng)},${cy + (arR - aw) * Math.sin(aAng)} ${cx + (arR + aw) * Math.cos(aAng)},${cy + (arR + aw) * Math.sin(aAng)}`}
        fill="#888" stroke="none" />
    );
  }

  // Diameter dimension
  const da = 40 * Math.PI / 180;
  e.push(
    <g key="dd" fill={DC} stroke={DC} strokeWidth={DS.dim}>
      <line x1={cx - R * Math.cos(da)} y1={cy + R * Math.sin(da)} x2={cx + R * Math.cos(da)} y2={cy - R * Math.sin(da)} />
      <circle cx={cx - R * Math.cos(da)} cy={cy + R * Math.sin(da)} r={0.9} stroke="none" />
      <circle cx={cx + R * Math.cos(da)} cy={cy - R * Math.sin(da)} r={0.9} stroke="none" />
      <text x={cx + R * Math.cos(da) + 3} y={cy - R * Math.sin(da) - 1.5}
        fontSize={5.5} fontFamily="'IBM Plex Mono', monospace" fill={DC} stroke="none" fontWeight="700">⌀{D}</text>
    </g>
  );

  return <g>{e}</g>;
}

      })()}

      <text x={aX + 6} y={y + h * 0.50 + 31} fontSize={3.8} fill="#4a6080" fontWeight="600">Sipariş No:</text>
      <text x={aX + 38} y={y + h * 0.50 + 31} fontSize={4.5} fill="#0a1525" fontWeight="800">{params.orderNo || "—"}</text>
      {LN(aX + 4, y + h * 0.50 + 34, aX + aW - 4, y + h * 0.50 + 34, 0.2, "#d0d8e0")}
      <text x={aX + 6} y={y + h * 0.50 + 41} fontSize={3.8} fill="#4a6080" fontWeight="600">Teslim:</text>
      <text x={aX + 30} y={y + h * 0.50 + 41} fontSize={4.5} fill="#0a1525" fontWeight="800">{params.deliveryDate || "—"}</text>

      {/* Mini QR Tanımlayıcı */}
      {(() => {
        const qx = x + w - 20, qy = y + h - 20, qs = 18;
        const str = (params.toolName || "") + (params.orderNo || "");
        if (!str) return null;
        let hash = 0;
        for (let i = 0; i < str.length; i++) hash = ((hash << 5) - hash + str.charCodeAt(i)) | 0;
        const cells = [];
        const grid = 7;
        const cs = qs / grid;
        for (let gy = 0; gy < grid; gy++) {
          for (let gx = 0; gx < grid; gx++) {
            // Corner finder patterns
            const isCorner = (gx < 3 && gy < 3) || (gx >= grid - 3 && gy < 3) || (gx < 3 && gy >= grid - 3);
            const isBorder = isCorner && (gx === 0 || gx === 2 || gx === grid-1 || gx === grid-3 || gy === 0 || gy === 2 || gy === grid-1 || gy === grid-3);
            const isCenter = isCorner && gx % 2 === 1 && gy % 2 === 1;
            const bit = (hash >> ((gy * grid + gx) % 31)) & 1;
            const on = isCorner ? (isBorder || isCenter) : bit;
            if (on) cells.push(<rect key={`q${gy}-${gx}`} x={qx + gx * cs} y={qy + gy * cs} width={cs - 0.2} height={cs - 0.2} fill="#1a1a2a" />);
          }
        }
        return <g><rect x={qx - 1} y={qy - 1} width={qs + 2} height={qs + 2} fill="#fff" stroke="#ddd" strokeWidth={0.3} rx={0.5} />{cells}</g>;
      })()}

    </g>
  );
}

// Ortak uncontrolled sayı inputu — silme/yazma sorununu çözer
function StepNumInput({ value, onChange, min, max, step = 1 }) {
  const [raw, setRaw] = React.useState(String(value));
  React.useEffect(() => { setRaw(String(value)); }, [value]);
  const commit = (str) => {
    const n = parseFloat(str);
    if (!isNaN(n)) onChange(n);
    else setRaw(String(value));
  };
  return (
    <input type="number" value={raw} step={step} min={min} max={max}
      onChange={(e) => setRaw(e.target.value)}
      onBlur={(e) => commit(e.target.value)}
      onKeyDown={(e) => { if (e.key === "Enter") commit(e.target.value); }}
      onFocus={(e) => e.target.select()}
      style={{ width: "100%", background: "var(--bg-surface)", border: "1px solid var(--border-mid)", borderRadius: 3, padding: "3px 4px", color: "var(--text-hi)", fontSize: 11, fontFamily: "var(--mono)", boxSizing: "border-box" }} />
  );
}

      </div>
      {lib.length > 0 && (
        <div style={{ borderTop: "1px solid var(--border-dim)", marginTop: 6, paddingTop: 6, display: "flex", gap: 4 }}>
          <button onClick={() => { const b = new Blob(["\uFEFF" + JSON.stringify(lib, null, 2)], { type: "application/json" }); const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = "mihenk-kutuphane.json"; a.click(); }}
            style={{ flex: 1, background: "var(--bg-surface)", border: "1px solid var(--border-mid)", borderRadius: 3, padding: "4px 0", color: "var(--text-mid)", fontSize: 8.5, cursor: "pointer", fontFamily: "var(--mono)" }}>📤 Dışa Aktar</button>
          <button onClick={() => { const inp = document.createElement("input"); inp.type = "file"; inp.accept = ".json"; inp.onchange = (e) => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = (ev) => { try { const d = JSON.parse(ev.target.result); if (Array.isArray(d)) saveLib([...lib, ...d]); } catch {} }; r.readAsText(f); }; inp.click(); }}
            style={{ flex: 1, background: "var(--bg-surface)", border: "1px solid var(--border-mid)", borderRadius: 3, padding: "4px 0", color: "var(--text-mid)", fontSize: 8.5, cursor: "pointer", fontFamily: "var(--mono)" }}>📥 İçe Aktar</button>
        </div>
      )}
    </div>
  );
}

function Panel({ params, setParams, isMobile, showPanel, onClose }) {
  const u = useCallback((k, v) => setParams((p) => ({ ...p, [k]: v })), [setParams]);
  const [openSec, setOpenSec] = useState({ geo: true, cool: false, show: false, col: false, doc: false, notes: false, cust: false, lib: false, step: true });
  const togSec = useCallback((k) => setOpenSec((s) => ({ ...s, [k]: !s[k] })), []);

  const SH = (label, key, icon = "▸") => {
    const open = openSec[key];
    return (
      <div onClick={() => togSec(key)} style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "6px 12px 6px 10px", cursor: "pointer", userSelect: "none",
        background: open ? "var(--bg-raised)" : "transparent",
        borderLeft: open ? "2px solid var(--accent)" : "2px solid transparent",
        borderBottom: "1px solid var(--border-dim)",
        transition: "background 0.12s",
      }}
        onMouseOver={(e) => { if (!open) e.currentTarget.style.background = "rgba(255,255,255,0.025)"; }}
        onMouseOut={(e) => { if (!open) e.currentTarget.style.background = "transparent"; }}
      >
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 9, color: open ? "var(--accent)" : "var(--text-lo)", fontFamily: "var(--mono)" }}>{icon}</span>
          <span style={{
            fontSize: 8.5, fontWeight: 700,
            color: open ? "var(--accent)" : "var(--text-mid)",
            textTransform: "uppercase", letterSpacing: 2, fontFamily: "var(--mono)",
          }}>{label}</span>
        </div>
        <span style={{
          fontSize: 7, color: open ? "var(--accent)" : "var(--text-lo)",
          transform: open ? "rotate(90deg)" : "rotate(0deg)",
          display: "inline-block", transition: "transform 0.18s",
        }}>▶</span>
      </div>
    );
  };

  const SB = { padding: "9px 12px 11px 14px", background: "var(--bg-raised)", borderLeft: "2px solid var(--accent)", borderBottom: "1px solid var(--border-dim)" };
  const INP = { width: "100%", background: "var(--bg-input)", border: "1px solid var(--border-mid)", borderRadius: 3, padding: "4px 7px", color: "var(--text-hi)", fontSize: 11, fontFamily: "var(--mono)", boxSizing: "border-box" };
  const LBL = { fontSize: 8, color: "var(--text-label)", display: "block", marginBottom: 3, fontFamily: "var(--mono)", textTransform: "uppercase", letterSpacing: 1.5 };

  return (
    <div style={{
      width: isMobile ? "88vw" : "var(--panel-w)",
      maxWidth: isMobile ? 380 : "var(--panel-w)",
      background: "var(--bg-panel)",
      borderRight: "1px solid var(--border-mid)",
      height: isMobile ? "100dvh" : "100vh",
      display: "flex",
      flexDirection: "column",
      flexShrink: 0,
      ...(isMobile ? {
        position: "fixed", left: showPanel ? 0 : "-100%", top: 0,
        zIndex: 1000, transition: "left 0.26s cubic-bezier(0.4,0,0.2,1)",
        boxShadow: showPanel ? "8px 0 40px rgba(0,0,0,0.85)" : "none",
      } : {}),
    }}>

      {/* ── HEADER ── */}
      <div style={{ background: "var(--bg-base)", borderBottom: "1px solid var(--border-mid)", flexShrink: 0 }}>
        {/* Accent stripe */}
        <div style={{ height: 2, background: "linear-gradient(90deg,var(--accent) 0%,var(--accent2) 55%,transparent 100%)" }} />
        <div style={{ padding: "10px 14px 9px" }}>
          {isMobile && (
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <span style={{ fontSize: 10, fontWeight: 700, color: "var(--accent)", fontFamily: "var(--mono)", letterSpacing: 2 }}>MİHENK</span>
              <button onClick={onClose} style={{ background: "transparent", border: "1px solid var(--border-hi)", borderRadius: 3, padding: "2px 8px", color: "var(--text-mid)", fontSize: 12, cursor: "pointer" }}>✕</button>
            </div>
          )}
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 7 }}>
            <img src={LOGO_IMG} style={{ width: 36, height: 14, objectFit: "contain", opacity: 0.9 }} alt="MİHENK" />
            <div>
              <div style={{ fontSize: 13, fontWeight: 700, color: "var(--text-hi)", letterSpacing: 2, fontFamily: "var(--display)", lineHeight: 1 }}>TEKNİK RESİM</div>
              <div style={{ fontSize: 7.5, color: "var(--accent)", fontFamily: "var(--mono)", letterSpacing: 2.5, marginTop: 2, opacity: 0.85 }}>KESİCİ TAKIM SİSTEMİ</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
            <span style={{ fontSize: 7.5, fontFamily: "var(--mono)", color: "var(--text-lo)", background: "var(--bg-surface)", border: "1px solid var(--border-dim)", borderRadius: 2, padding: "1px 6px", letterSpacing: 1 }}>v2.0</span>
            <span style={{ fontSize: 7.5, fontFamily: "var(--mono)", color: "var(--accent2)", background: "rgba(58,143,212,0.06)", border: "1px solid rgba(58,143,212,0.20)", borderRadius: 2, padding: "1px 6px", letterSpacing: 0.8 }}>⌀{params.D}×{params.L}mm · {params.z}Z</span>
          </div>
        </div>
      </div>

      {/* ── TAKIM TİPİ (always visible) ── */}
      <div style={{ padding: "8px 12px", background: "var(--bg-surface)", borderBottom: "1px solid var(--border-mid)", flexShrink: 0 }}>
        <div style={{ fontSize: 8, fontWeight: 700, color: "var(--text-label)", textTransform: "uppercase", letterSpacing: 2, marginBottom: 5, fontFamily: "var(--mono)" }}>▸ TAKIM TİPİ</div>
        <select value={params.toolType} onChange={(e) => u("toolType", e.target.value)}
          style={{ ...INP, fontSize: 11.5, padding: "5px 8px", fontWeight: 600, color: "var(--accent)" }}>
          {Object.entries(TOOL_TYPES).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
        </select>
      </div>

      {/* ── SCROLLABLE BODY ── */}
      <div style={{ flex: 1, overflowY: "auto" }}>

        {/* ANA BOYUTLAR */}
        <div style={{ borderBottom: "1px solid var(--border-dim)" }}>
          <div style={{ padding: "5px 12px 5px 12px", background: "var(--bg-surface)", borderBottom: "1px solid var(--border-dim)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 8.5, fontWeight: 700, color: "var(--text-label)", textTransform: "uppercase", letterSpacing: 2, fontFamily: "var(--mono)" }}>▸ ANA BOYUTLAR</span>
            <span style={{ fontSize: 7.5, color: "var(--text-lo)", fontFamily: "var(--mono)", letterSpacing: 1 }}>+ TOLERANS</span>
          </div>
          <div style={SB}>
            {params.toolType !== "stepdrill" && (
              <NIT label="Çap (D)" value={params.D} onChange={(v) => u("D", v)} min={0.5} max={100} step={0.5} tolVal={params.tolD} onTolChange={(v) => u("tolD", v)} />
            )}
            <NIT label="Sap Çapı (d)" value={params.d} onChange={(v) => u("d", v)} min={0.5} max={100} step={0.5} tolVal={params.told} onTolChange={(v) => u("told", v)} />
            <NIT label="Toplam Boy" value={params.L} onChange={(v) => u("L", v)} min={5} max={500} tolVal={params.tolL} onTolChange={(v) => u("tolL", v)} />
            {params.toolType !== "stepdrill" && (
              <NIT label="Kesici Boy" value={params.l1} onChange={(v) => u("l1", v)} min={1} max={300} step={0.5} tolVal={params.toll1} onTolChange={(v) => u("toll1", v)} />
            )}
            {params.toolType !== "stepdrill" && (
              <>
                <NIT label="Boğaz (l₂)" value={params.l2} onChange={(v) => u("l2", v)} min={0} max={200} step={0.5} tolVal={params.toll2} onTolChange={(v) => u("toll2", v)} />
                {params.l2 > 0 && <NIT label="Boğaz Çapı" value={params.neckDia} onChange={(v) => u("neckDia", v)} min={0.5} max={params.d} step={0.1} tolVal={params.tolNeck} onTolChange={(v) => u("tolNeck", v)} />}
                {params.l2 > 0 && <NI label="Şaft→Boğaz" value={params.neckAngle} onChange={(v) => u("neckAngle", v)} min={10} max={90} step={5} unit="°" />}
                {params.l2 > 0 && params.D > params.neckDia && (
                  <NI label="Kesici→Boğaz" value={params.cutNeckAngle ?? 90} onChange={(v) => u("cutNeckAngle", v)} min={10} max={90} step={5} unit="°" />
                )}
              </>
            )}
            {params.toolType === "stepdrill" && (
              <div style={{ fontSize: 9, color: "var(--text-lo)", fontStyle: "italic", fontFamily: "var(--mono)", marginTop: 2 }}>Kesici boy ve çaplar kademelerden hesaplanır</div>
            )}
          </div>
        </div>

        {/* GEOMETRİ */}
        {SH("Geometri", "geo", "⟳")}
        {openSec.geo && <div style={SB}>
          <NI label="Diş Sayısı (z)" value={params.z} onChange={(v) => u("z", v)} min={1} max={16} unit="Z" />
          <NI label="Helis Açısı" value={params.helix} onChange={(v) => u("helix", v)} min={0} max={60} unit="°" />
          <NI label="Çekirdek (dc)" value={params.dCore} onChange={(v) => u("dCore", v)} min={0} max={params.D} step={0.1} />
          {params.toolType === "drill" && <NI label="Uç Açısı" value={params.pointAngle} onChange={(v) => u("pointAngle", v)} min={60} max={180} step={1} unit="°" />}
          <div style={{ display: "flex", gap: 6, marginBottom: 2 }}>
            {[["helixHand","Helis Yönü"],["cutDir","Kesim Yönü"]].map(([k,lbl]) => (
              <div key={k} style={{ flex: 1 }}>
                <label style={LBL}>{lbl}</label>
                <select value={params[k]} onChange={(e) => u(k, e.target.value)}
                  style={{ width: "100%", background: "var(--bg-input)", border: "1px solid var(--border-mid)", borderRadius: 3, padding: "3px 5px", color: "var(--text-hi)", fontSize: 11, fontFamily: "var(--mono)" }}>
                  <option value="Sağ">Sağ</option><option value="Sol">Sol</option>
                </select>
              </div>
            ))}
          </div>
          {params.toolType === "bullnose" && <NI label="Köşe R" value={params.rCorner} onChange={(v) => u("rCorner", v)} min={0} max={params.D/2} step={0.1} />}
          {params.toolType === "chamfer" && <NI label="Pah Boyu" value={params.chamferSize} onChange={(v) => u("chamferSize", v)} min={0} max={params.D/2} step={0.1} />}
        </div>}

        {/* KADEMELER */}
        {params.toolType === "stepdrill" && <>
          {SH("Kademeler", "step", "◈")}
          {openSec.step && <div style={SB}>
            {(params.steps || []).map((st, idx) => (
              <div key={idx} style={{ marginBottom: 7, padding: "6px 7px", background: "var(--bg-input)", borderRadius: 3, border: "1px solid var(--border-mid)" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
                  <span style={{ fontSize: 8.5, color: "var(--accent)", fontWeight: 700, fontFamily: "var(--mono)", letterSpacing: 1.5 }}>KD-{idx + 1}</span>
                  {(params.steps || []).length > 1 && (
                    <button onClick={() => setParams(p => ({ ...p, steps: p.steps.filter((_,i) => i !== idx) }))}
                      style={{ background: "transparent", border: "1px solid var(--red)", borderRadius: 2, padding: "1px 6px", color: "var(--red)", fontSize: 8, cursor: "pointer", fontFamily: "var(--mono)" }}>SİL</button>
                  )}
                </div>
                <div style={{ display: "flex", gap: 4, marginBottom: 3 }}>
                  {[["dia","⌀ ÇAP",0.1,0.5],["len","BOY",0.5,0.5],["angle","AÇI°",1,30]].map(([fld,lbl,stp,mn]) => (
                    <div key={fld} style={{ flex: 1 }}>
                      <label style={LBL}>{lbl}</label>
                      <StepNumInput value={st[fld]} step={stp} min={mn}
                        onChange={(n) => setParams(p => ({...p, steps: p.steps.map((s,i) => i===idx ? {...s,[fld]:n} : s)}))} />
                    </div>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 4 }}>
                  {[["tolDia","TOL ÇAP"],["tolLen","TOL BOY"]].map(([fld,lbl]) => (
                    <div key={fld} style={{ flex: 1 }}>
                      <label style={LBL}>{lbl}</label>
                      <TolInput value={st[fld]||""} onChange={(v) => setParams(p => ({...p, steps: p.steps.map((s,i) => i===idx ? {...s,[fld]:v} : s)}))} />
                    </div>
                  ))}
                </div>
              </div>
            ))}
            <button onClick={() => { const last=(params.steps||[]).slice(-1)[0]; setParams(p => ({...p, steps: [...(p.steps||[]), {dia: last?last.dia+2:params.D, len:15, angle:90, tolDia:"", tolLen:""}]})); }}
              style={{ width: "100%", background: "transparent", border: "1px dashed var(--border-hi)", borderRadius: 3, padding: "5px 0", color: "var(--accent)", fontSize: 8.5, cursor: "pointer", fontFamily: "var(--mono)", fontWeight: 700, letterSpacing: 2, textTransform: "uppercase" }}>
              + KADEME EKLE
            </button>
          </div>}
        </>}

        {/* SOĞUTMA */}
        {SH("Soğutma", "cool", "⬡")}
        {openSec.cool && <div style={SB}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5 }}>
            <label style={{ fontSize: 10.5, color: "var(--text-mid)", fontFamily: "var(--mono)" }}>Soğutma Deliği</label>
            <input type="checkbox" checked={params.coolantHole} onChange={(e) => u("coolantHole", e.target.checked)} style={{ accentColor: "var(--accent)", width: 14, height: 14 }} />
          </div>
          {params.coolantHole && <NI label="Delik Sayısı" value={params.coolantCount} onChange={(v) => u("coolantCount", v)} min={1} max={8} unit="ad" />}
        </div>}


        {/* RESİMDE GÖSTER */}
        {SH("Resimde Göster", "show", "◎")}
        {openSec.show && <div style={SB}>
          {[["showDimD","⌀D Kesici Çap"],["showDimd","⌀d Sap Çapı"],["showDimL","L Toplam Boy"],["showDiml1","l₁ Kesici Boy"],["showDiml2","l₂ Boğaz Boyu"],["showDimNeck","⌀ Boğaz Çapı"],["showDimAngles","Açılar / R"]].map(([key,lbl]) => (
            <div key={key} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, cursor: "pointer" }} onClick={() => u(key, !params[key])}>
              <div style={{ width: 13, height: 13, borderRadius: 2, flexShrink: 0, background: params[key] ? "var(--accent)" : "transparent", border: `1px solid ${params[key] ? "var(--accent)" : "var(--border-hi)"}`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                {params[key] && <span style={{ fontSize: 8, color: "#000", fontWeight: 900, lineHeight: 1 }}>✓</span>}
              </div>
              <label style={{ fontSize: 10, color: params[key] ? "var(--text-hi)" : "var(--text-mid)", fontFamily: "var(--mono)", cursor: "pointer" }}>{lbl}</label>
            </div>
          ))}
        </div>}

        {/* RENKLER */}
        {SH("Renkler", "col", "▣")}
        {openSec.col && <div style={SB}>
          {[["colShank","Sap"],["colNeck","Boğaz"],["colCut","Kesici"],["colFlute","Kanal"],["colTip","Uç"]].map(([key,lbl]) => (
            <div key={key} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
              <input type="color" value={params[key]} onChange={(ev) => u(key, ev.target.value)}
                style={{ width: 24, height: 18, border: "1px solid var(--border-hi)", borderRadius: 2, padding: 0, cursor: "pointer", background: "none", flexShrink: 0 }} />
              <label style={{ fontSize: 10, color: "var(--text-mid)", fontFamily: "var(--mono)", flex: 1 }}>{lbl}</label>
              <span style={{ fontSize: 8, color: "var(--text-lo)", fontFamily: "var(--mono)" }}>{params[key]}</span>
            </div>
          ))}
          <div style={{ borderTop: "1px solid var(--border-dim)", marginTop: 7, paddingTop: 7, display: "flex", flexWrap: "wrap", gap: 4 }}>
            {[
              {l:"Numroto",c:{colShank:"#c8ccd2",colNeck:"#b0b5bc",colCut:"#6088b0",colFlute:"#3a5a78",colTip:"#88aed0"}},
              {l:"Altın",c:{colShank:"#c8ccd2",colNeck:"#b0b5bc",colCut:"#b08830",colFlute:"#786028",colTip:"#d0b060"}},
              {l:"TiAlN",c:{colShank:"#c8ccd2",colNeck:"#b0b5bc",colCut:"#7858a8",colFlute:"#4a3878",colTip:"#9878c0"}},
              {l:"DLC",c:{colShank:"#c0c4c8",colNeck:"#a0a4a8",colCut:"#484848",colFlute:"#282828",colTip:"#606060"}},
              {l:"TiN",c:{colShank:"#c8ccd2",colNeck:"#b0b5bc",colCut:"#c0a030",colFlute:"#887020",colTip:"#d8c050"}},
              {l:"AlTiN",c:{colShank:"#c8ccd2",colNeck:"#b0b5bc",colCut:"#5a4848",colFlute:"#3a2828",colTip:"#786060"}},
              {l:"Sade",c:{colShank:"#d0d0d0",colNeck:"#c0c0c0",colCut:"#b8b8b8",colFlute:"#888888",colTip:"#c8c8c8"}},
            ].map(p => (
              <button key={p.l} onClick={() => setParams(pr => ({...pr,...p.c}))}
                style={{ background:"var(--bg-input)", border:"1px solid var(--border-mid)", borderRadius:2, padding:"2px 8px", color:"var(--text-mid)", fontSize:8.5, cursor:"pointer", fontFamily:"var(--mono)", letterSpacing:0.5 }}
                onMouseOver={(e) => { e.currentTarget.style.background="var(--bg-surface)"; e.currentTarget.style.color="var(--accent)"; e.currentTarget.style.borderColor="var(--accent)"; }}
                onMouseOut={(e) => { e.currentTarget.style.background="var(--bg-input)"; e.currentTarget.style.color="var(--text-mid)"; e.currentTarget.style.borderColor="var(--border-mid)"; }}>
                {p.l}
              </button>
            ))}
          </div>
        </div>}

        {/* DOKÜMAN */}
        {SH("Doküman Bilgileri", "doc", "☰")}
        {openSec.doc && <div style={SB}>
          <div style={{ marginBottom: 5 }}>
            <label style={LBL}>Alet Adı</label>
            <input type="text" value={params.toolName} onChange={(e) => u("toolName", e.target.value)} style={INP} />
          </div>

          {/* ── Alt Blok Düzeni ── */}
          <div style={{ borderTop: "1px solid var(--border-dim)", marginTop: 8, paddingTop: 8 }}>
            <div style={{ fontSize: 8, fontWeight: 700, color: "var(--accent)", letterSpacing: 1.5, marginBottom: 6, fontFamily: "var(--mono)" }}>ALT BLOK DÜZENİ</div>
            <NI label="Toplam Gen." value={params.bbWidth} onChange={(v) => u("bbWidth", Math.max(40, Math.min(100, v)))} min={40} max={100} step={1} unit="%" />
            <NI label="Param. Kol." value={params.bbCol1} onChange={(v) => u("bbCol1", Math.max(10, Math.min(40, v)))} min={10} max={40} step={1} unit="%" />
            <NI label="Firma Kol." value={params.bbCol2} onChange={(v) => u("bbCol2", Math.max(15, Math.min(55, v)))} min={15} max={55} step={1} unit="%" />
            <div style={{ fontSize: 8.5, color: "var(--accent2)", fontFamily: "var(--mono)", marginTop: 3, fontWeight: 600 }}>
              Alet Adı Kol: %{100 - params.bbCol1 - params.bbCol2}
            </div>
          </div>
        </div>}

        {/* NOTLAR (Balon) */}
        {SH("Notlar", "notes", "◉")}
        {openSec.notes && <div style={SB}>
          <div style={{ fontSize: 8, color: "var(--text-lo)", fontFamily: "var(--mono)", marginBottom: 5 }}>Çizim üzerine numaralı not balonları ekle. Sürükle ile taşı.</div>
          {(params.notes || []).map((note, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 4, marginBottom: 4 }}>
              <span style={{ width: 18, height: 18, borderRadius: "50%", background: "#d32f2f", color: "#fff", fontSize: 10, fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontFamily: "var(--mono)" }}>{i + 1}</span>
              <input type="text" value={note.text} onChange={(e) => { const v = e.target.value; setParams(p => ({ ...p, notes: p.notes.map((n, j) => j === i ? { ...n, text: v } : n) })); }}
                placeholder="Not yazın..." style={{ ...INP, flex: 1, fontSize: 10 }} />
              <button onClick={() => setParams(p => ({ ...p, notes: p.notes.filter((_, j) => j !== i) }))}
                style={{ background: "transparent", border: "1px solid var(--red)", borderRadius: 2, padding: "1px 5px", color: "var(--red)", fontSize: 9, cursor: "pointer", fontFamily: "var(--mono)", flexShrink: 0 }}>✕</button>
            </div>

// Türkçe → İngilizce başlık eşleme
const CSV_HEADER_MAP = {
  "Takım Adı":"toolName","Takım Tipi":"toolType",
  "Çap (D)":"D","Sap Çapı (d)":"d","Toplam Boy (L)":"L",
  "Kesici Boy (l1)":"l1","Boğaz Boyu (l2)":"l2",
  "Diş Sayısı":"z","Helis Açısı":"helix","Çekirdek Çapı":"dCore",
  "Malzeme":"material","Kaplama":"coating",
  "Boğaz Çapı":"neckDia","Geçiş Açısı":"neckAngle",
  "Köşe R":"rCorner","Pah Boyu":"chamferSize",
  "Uç Açısı":"pointAngle","Soğutma":"coolantHole","Soğutma Adet":"coolantCount",
  "Tol D":"tolD","Tol d":"told","Tol l1":"toll1",
  "Müşteri Adı":"customerName","Sipariş No":"orderNo","Teslim Tarihi":"deliveryDate",
  "KD1 Çap":"step1_dia","KD1 Boy":"step1_len","KD1 Açı":"step1_angle","KD1 Tol Çap":"step1_tolDia","KD1 Tol Boy":"step1_tolLen",
  "KD2 Çap":"step2_dia","KD2 Boy":"step2_len","KD2 Açı":"step2_angle","KD2 Tol Çap":"step2_tolDia","KD2 Tol Boy":"step2_tolLen",
  "KD3 Çap":"step3_dia","KD3 Boy":"step3_len","KD3 Açı":"step3_angle","KD3 Tol Çap":"step3_tolDia","KD3 Tol Boy":"step3_tolLen",
};
const TIP_MAP = {
  "Düz Freze":"flat","Küre Freze":"ballnose","Radyus Freze":"bullnose","Pah Freze":"chamfer","Matkap":"drill","Kademeli Matkap":"stepdrill",
  "Düz (Flat)":"flat","Ball Nose":"ballnose","Radyuslu Freze":"bullnose","Pah (Chamfer)":"chamfer","Matkap (Drill)":"drill","Kademeli Matkap (Step)":"stepdrill",
  "flat":"flat","ballnose":"ballnose","bullnose":"bullnose","chamfer":"chamfer","drill":"drill","stepdrill":"stepdrill"};

function parseCSV(text) {
  const sep = text.indexOf(";") > -1 ? ";" : ",";
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const rawHeaders = lines[0].split(sep).map(h => h.trim());
  const headers = rawHeaders.map(h => CSV_HEADER_MAP[h] || h);
  const numFields = ["D","d","L","l1","l2","z","helix","dCore","neckDia","neckAngle","rCorner","chamferSize","pointAngle","coolantCount","bbWidth","bbCol1","bbCol2"];
  const boolFields = ["coolantHole"];
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = line.split(sep).map(v => v.trim());
    const obj = {};
    headers.forEach((h, i) => {
      if (h === "toolType") obj[h] = TIP_MAP[vals[i]] || vals[i] || "flat";
      else if (numFields.includes(h)) obj[h] = parseFloat(vals[i]) || 0;
      else if (boolFields.includes(h)) obj[h] = vals[i] === "true" || vals[i] === "1" || vals[i] === "Evet";
      else obj[h] = vals[i] || "";
    });
    const steps = [];
    for (let s = 1; s <= 10; s++) {
      const diaIdx = headers.indexOf(`step${s}_dia`);
      if (diaIdx < 0) break;
      const dia = parseFloat(vals[diaIdx]);
      if (!dia || dia <= 0) break;
      steps.push({
        dia, len: parseFloat(vals[headers.indexOf(`step${s}_len`)]||0)||0,
        angle: parseFloat(vals[headers.indexOf(`step${s}_angle`)]||0)||90,
        tolDia: vals[headers.indexOf(`step${s}_tolDia`)]||"",
        tolLen: vals[headers.indexOf(`step${s}_tolLen`)]||"",
      });
    }
    if (steps.length > 0) obj.steps = steps;
    return { ...DEFAULT_PARAMS, ...obj };
  });
}

// .xlsx dosyasını parseCSV uyumlu CSV metnine dönüştür
function parseXlsx(arrayBuffer) {
  if (!window.XLSX) return [];
  const X = window.XLSX;
  const wb = X.read(arrayBuffer, { type: "array" });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const csv = X.utils.sheet_to_csv(ws, { FS: ";" });
  return parseCSV(csv);
}

// ─── 3D PREVIEW — Gerçekçi Freze Geometrisi ─────────────
function ThreeDView({ params }) {
  const mountRef = useRef(null);
  const stateRef = useRef({});

  useEffect(() => {
    const el = mountRef.current;
    if (!el || !window.THREE) return;
    const T = window.THREE;
    const scene = new T.Scene();
    scene.background = new T.Color("#dde2e8");
    const camera = new T.PerspectiveCamera(32, el.clientWidth / el.clientHeight, 0.01, 100);
    const renderer = new T.WebGLRenderer({ antialias: true });
    renderer.setSize(el.clientWidth, el.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = T.PCFSoftShadowMap;
    el.appendChild(renderer.domElement);

    scene.add(new T.AmbientLight("#e8ecf0", 0.5));
    const dl1 = new T.DirectionalLight("#fff", 0.9); dl1.position.set(4,6,5); dl1.castShadow = true; scene.add(dl1);
    const dl2 = new T.DirectionalLight("#b0c8e0", 0.4); dl2.position.set(-3,-2,5); scene.add(dl2);
    const dl3 = new T.DirectionalLight("#e0d0b0", 0.3); dl3.position.set(0,-5,-3); scene.add(dl3);

    const grid = new T.GridHelper(8, 40, "#a0a8b0", "#c8ced4");
    grid.rotation.x = Math.PI / 2; grid.position.z = -1.2; scene.add(grid);

    const toolGroup = new T.Group(); scene.add(toolGroup);
    stateRef.current = { scene, camera, renderer, toolGroup, el, T };

    let isDrag=false, pX=0, pY=0, rX=-0.15, rY=0.6, dist=4.2;
    const onD=(e)=>{isDrag=true;const p=e.touches?e.touches[0]:e;pX=p.clientX;pY=p.clientY;};
    const onM=(e)=>{if(!isDrag)return;e.preventDefault();const p=e.touches?e.touches[0]:e;rY+=(p.clientX-pX)*0.007;rX+=(p.clientY-pY)*0.007;rX=Math.max(-1.5,Math.min(1.5,rX));pX=p.clientX;pY=p.clientY;};
    const onU=()=>{isDrag=false;};
    const onW=(e)=>{e.preventDefault();dist=Math.max(1,Math.min(12,dist+e.deltaY*0.004));};
    const cv = renderer.domElement;
    cv.addEventListener("mousedown",onD); cv.addEventListener("mousemove",onM); cv.addEventListener("mouseup",onU); cv.addEventListener("mouseleave",onU);
    cv.addEventListener("touchstart",onD,{passive:false}); cv.addEventListener("touchmove",onM,{passive:false}); cv.addEventListener("touchend",onU);
    cv.addEventListener("wheel",onW,{passive:false});

    let raf;
    const anim=()=>{raf=requestAnimationFrame(anim);camera.position.set(dist*Math.sin(rY)*Math.cos(rX),dist*Math.sin(rX),dist*Math.cos(rY)*Math.cos(rX));camera.lookAt(0,0,0);renderer.render(scene,camera);};
    anim();
    const onRz=()=>{if(!el.clientWidth)return;camera.aspect=el.clientWidth/el.clientHeight;camera.updateProjectionMatrix();renderer.setSize(el.clientWidth,el.clientHeight);};
    window.addEventListener("resize",onRz);
    return()=>{cancelAnimationFrame(raf);window.removeEventListener("resize",onRz);
      cv.removeEventListener("mousedown",onD);cv.removeEventListener("mousemove",onM);cv.removeEventListener("mouseup",onU);cv.removeEventListener("mouseleave",onU);
      cv.removeEventListener("touchstart",onD);cv.removeEventListener("touchmove",onM);cv.removeEventListener("touchend",onU);cv.removeEventListener("wheel",onW);
      renderer.dispose();if(el.contains(cv))el.removeChild(cv);};
  }, []);

  useEffect(() => {
    const { toolGroup, T } = stateRef.current;
    if (!toolGroup || !T) return;
    while(toolGroup.children.length){const c=toolGroup.children[0];if(c.geometry)c.geometry.dispose();if(c.material){if(Array.isArray(c.material))c.material.forEach(m=>m.dispose());else c.material.dispose();}toolGroup.remove(c);}

    let { D, d, L, l1, l2, z, helix, toolType, neckDia, neckAngle, cutNeckAngle, dCore, rCorner, chamferSize, pointAngle } = params;
    cutNeckAngle = cutNeckAngle ?? 90;
    if (toolType==="stepdrill"){const stps=params.steps||[];l1=stps.reduce((s,st)=>s+(st.len||0),0);l2=0;D=stps.length>0?Math.max(...stps.map(s=>s.dia)):D;}
    const sc = 3/L;
    const hD=D/2*sc, hd=d/2*sc, tL=L*sc, cL=l1*sc, nL=l2*sc;
    const nDia=l2>0?neckDia:D, hN=nDia/2*sc;
    const cR=Math.min(dCore/2*sc, hD*0.65);
    const aRad=(neckAngle*Math.PI)/180;
    const transDx=(l2>0&&d>nDia)?((d-nDia)/2)/Math.tan(aRad)*sc:0;
    const cutAngleRad3d=(cutNeckAngle*Math.PI)/180;
    const cutTransDx=(l2>0&&D>nDia&&cutNeckAngle<89.5)?((D-nDia)/2)/Math.tan(cutAngleRad3d)*sc:0;
    const sL=tL-cL-nL-transDx-cutTransDx;
    const hRad=(helix||30)*Math.PI/180;
    const nF=z||4;
    const aSeg=96;

    const hC=(hex)=>new T.Color(hex);
    const matS=new T.MeshStandardMaterial({color:hC(params.colShank),metalness:0.75,roughness:0.22});
    const matN=new T.MeshStandardMaterial({color:hC(params.colNeck),metalness:0.7,roughness:0.28});
    const matC=new T.MeshStandardMaterial({color:hC(params.colCut),metalness:0.82,roughness:0.18,side:T.DoubleSide});
    const matT=new T.MeshStandardMaterial({color:hC(params.colTip),metalness:0.85,roughness:0.15,side:T.DoubleSide});

    // Gerçekçi kesit profili — her diş için:
    // Kesici kenar → birincil margin → birincil relief → kanal dibi → arka duvar → topuk
    function profileR(angle, oR, iR, numF) {
      const tooth = (Math.PI*2)/numF;
      let a = ((angle % tooth) + tooth) % tooth;
      const n = a / tooth;
      if (n < 0.04) return oR;
      if (n < 0.14) return oR * 0.998;
      if (n < 0.20) { const t=(n-0.14)/0.06; return oR*(0.998 - t*0.12); }
      if (n < 0.28) { const t=(n-0.20)/0.08; return oR*0.878 + (iR - oR*0.878)*t; }
      if (n < 0.75) { const t=(n-0.28)/0.47; return iR*(1 - 0.08*Math.sin(t*Math.PI)); }
      if (n < 0.92) { const t=(n-0.75)/0.17; const e=t*t*(3-2*t); return iR + (oR*0.96-iR)*e; }
      const t=(n-0.92)/0.08; return oR*(0.96 + 0.04*t);
    }

    // Helisel kanallı gövde mesh
    function buildFluted(oR, iR, len, numF, hAng, yS) {
      const axS = Math.max(Math.round(len*120/tL), 40);
      const verts=[], norms=[], uvs=[], idx=[];
      for (let yi=0; yi<=axS; yi++) {
        const t=yi/axS, y=yS+t*len;
        const ho = hAng>0 ? (t*len)/Math.tan(hAng)/oR : 0;
        for (let ai=0; ai<aSeg; ai++) {
          const ba=(ai/aSeg)*Math.PI*2;
          const a = ba + ho;
          const r = profileR(a, oR, iR, numF);
          verts.push(r*Math.cos(ba+ho), y, r*Math.sin(ba+ho));
          norms.push(Math.cos(ba+ho), 0, Math.sin(ba+ho));
          uvs.push(ai/aSeg, t);
        }
      }
      for (let yi=0; yi<axS; yi++) {
        for (let ai=0; ai<aSeg; ai++) {
          const c=yi*aSeg+ai, n2=yi*aSeg+(ai+1)%aSeg;
          const cu=(yi+1)*aSeg+ai, nu=(yi+1)*aSeg+(ai+1)%aSeg;
          idx.push(c,n2,cu, n2,nu,cu);
        }
      }
      const geo = new T.BufferGeometry();
      geo.setAttribute("position", new T.Float32BufferAttribute(verts,3));
      geo.setAttribute("normal", new T.Float32BufferAttribute(norms,3));
      geo.setAttribute("uv", new T.Float32BufferAttribute(uvs,2));
      geo.setIndex(idx);
      geo.computeVertexNormals();
      return geo;
    }

    // Uç alın yüzeyi — gash ve kesici kenarlarla
    function buildEndFace(oR, iR, numF, yP, hAng, bLen) {
      const g = new T.Group();
      const ho = hAng>0 ? bLen/Math.tan(hAng)/oR : 0;
      const pts=180;
      const sh = new T.Shape();
      for (let i=0; i<=pts; i++) {
        const ba=(i/pts)*Math.PI*2, a=ba+ho;
        const r = profileR(a, oR, iR, numF);
        const x=r*Math.cos(ba+ho), zz=r*Math.sin(ba+ho);
        if(i===0) sh.moveTo(x,zz); else sh.lineTo(x,zz);
      }
      const fm = new T.Mesh(new T.ShapeGeometry(sh), matT);
      fm.rotation.x=-Math.PI/2; fm.position.y=yP; g.add(fm);

      const gM = new T.LineBasicMaterial({color:0x1a1a1a});
      for (let fi=0; fi<numF; fi++) {
        const a=(fi/numF)*Math.PI*2+ho;
        const p1=[new T.Vector3(iR*0.15*Math.cos(a+0.15),yP+0.003,iR*0.15*Math.sin(a+0.15)),
          new T.Vector3(oR*0.98*Math.cos(a),yP+0.003,oR*0.98*Math.sin(a))];
        g.add(new T.Line(new T.BufferGeometry().setFromPoints(p1),gM));
        const ga=a+Math.PI*2/numF*0.12;
        const p2=[new T.Vector3(iR*0.1*Math.cos(a+0.3),yP+0.003,iR*0.1*Math.sin(a+0.3)),
          new T.Vector3(oR*0.55*Math.cos(ga),yP+0.003,oR*0.55*Math.sin(ga))];
        g.add(new T.Line(new T.BufferGeometry().setFromPoints(p2),new T.LineBasicMaterial({color:0x444444})));
      }
      const wm=new T.Mesh(new T.RingGeometry(0,iR*0.2,24),new T.MeshStandardMaterial({color:hC(params.colFlute),metalness:0.5,roughness:0.6,side:T.DoubleSide}));
      wm.rotation.x=-Math.PI/2; wm.position.y=yP+0.002; g.add(wm);
      return g;
    }

    let curY = 0;

    // Sap
    if (sL>0.002) {
      toolGroup.add(new T.Mesh(new T.CylinderGeometry(hd,hd,sL,aSeg),matS)).position.y=curY+sL/2;
      const cap=new T.Mesh(new T.CircleGeometry(hd,aSeg),matS); cap.rotation.x=Math.PI/2; cap.position.y=curY; toolGroup.add(cap);
      curY+=sL;
    }
    // Geçiş 1: Şaft → Boğaz
    if (transDx>0.002) { toolGroup.add(new T.Mesh(new T.CylinderGeometry(hN,hd,transDx,aSeg),matN)).position.y=curY+transDx/2; curY+=transDx; }
    // Boyun
    if (nL>0.002) { toolGroup.add(new T.Mesh(new T.CylinderGeometry(hN,hN,nL,aSeg),matN)).position.y=curY+nL/2; curY+=nL; }
    // Geçiş 2: Boğaz → Kesici (YENİ)
    if (cutTransDx>0.002) { toolGroup.add(new T.Mesh(new T.CylinderGeometry(hD,hN,cutTransDx,aSeg),matC)).position.y=curY+cutTransDx/2; curY+=cutTransDx; }

    const cutStart = curY;

    if (toolType === "stepdrill") {
      const stps=params.steps||[];
      let cy=cutStart;
      for (let i=stps.length-1; i>=0; i--) {
        const st=stps[i], hr=st.dia/2*sc, cr=Math.min(cR,hr*0.6), stepLen=st.len*sc;
        toolGroup.add(new T.Mesh(buildFluted(hr,cr,stepLen,nF,hRad,cy), i===0?matT:matC));
        cy+=stepLen;
      }
      if (stps.length>0) { const st0=stps[0],hr0=st0.dia/2*sc,ptA=(st0.angle||140)*Math.PI/180,tipH=hr0/Math.tan(ptA/2);
        toolGroup.add(new T.Mesh(new T.ConeGeometry(hr0,tipH,aSeg),matT)).position.y=cy+tipH/2; }
    } else if (toolType === "drill") {
      const ptA=(pointAngle||140)*Math.PI/180, tipH=hD/Math.tan(ptA/2), bodyLen=Math.max(cL-tipH,0.01);
      toolGroup.add(new T.Mesh(buildFluted(hD,cR,bodyLen,nF,hRad,cutStart),matC));
      toolGroup.add(new T.Mesh(new T.ConeGeometry(hD,tipH,aSeg),matT)).position.y=cutStart+bodyLen+tipH/2;
    } else if (toolType === "ballnose") {
      const bodyLen=Math.max(cL-hD,0.01);
      toolGroup.add(new T.Mesh(buildFluted(hD,cR,bodyLen,nF,hRad,cutStart),matC));
      const sm=new T.Mesh(new T.SphereGeometry(hD,aSeg,aSeg/2,0,Math.PI*2,0,Math.PI/2),matT);
      sm.position.y=cutStart+bodyLen; toolGroup.add(sm);
    } else {
      let tipH=0;
      if (toolType==="chamfer"&&chamferSize>0) tipH=chamferSize*sc;
      else if (toolType==="bullnose"&&rCorner>0) tipH=rCorner*sc;
      const bodyLen=Math.max(cL-tipH,0.01);
      toolGroup.add(new T.Mesh(buildFluted(hD,cR,bodyLen,nF,hRad,cutStart),matC));
      toolGroup.add(buildEndFace(hD,cR,nF,cutStart+bodyLen,hRad,bodyLen));
      if (toolType==="chamfer"&&chamferSize>0) {
        const cs=chamferSize*sc;
        toolGroup.add(new T.Mesh(new T.CylinderGeometry(hD-cs,hD,cs,aSeg),matT)).position.y=cutStart+bodyLen+cs/2;
        const cap=new T.Mesh(new T.CircleGeometry(hD-cs,aSeg),matT); cap.rotation.x=-Math.PI/2; cap.position.y=cutStart+bodyLen+cs; toolGroup.add(cap);
      } else if (toolType==="bullnose"&&rCorner>0) {
        const rC=rCorner*sc;
        toolGroup.add(new T.Mesh(new T.CylinderGeometry(hD-rC,hD,rC*2,aSeg),matT)).position.y=cutStart+bodyLen+rC;
        const cap=new T.Mesh(new T.CircleGeometry(hD-rC,aSeg),matT); cap.rotation.x=-Math.PI/2; cap.position.y=cutStart+bodyLen+rC*2; toolGroup.add(cap);
      }
    }

    // Merkez + Konum
    const cOff=tL/2;
    toolGroup.children.forEach(c=>{c.position.y-=cOff;});
    toolGroup.rotation.z=-Math.PI/2;
    toolGroup.add(new T.Line(new T.BufferGeometry().setFromPoints([new T.Vector3(0,-cOff-0.15,0),new T.Vector3(0,cOff+0.15,0)]),new T.LineBasicMaterial({color:0xcc2222})));

  }, [params]);

  return (
    <div ref={mountRef} style={{width:"100%",height:"100%",borderRadius:4,overflow:"hidden",position:"relative",cursor:"grab"}}>
      <div style={{position:"absolute",top:8,left:8,fontSize:10,color:"#4a5a6a",fontFamily:"'IBM Plex Mono',monospace",background:"rgba(255,255,255,0.88)",padding:"4px 10px",borderRadius:3,pointerEvents:"none",fontWeight:600}}>
        ⌀{params.D}×{params.L}mm · {params.z}Z · {TOOL_TYPES[params.toolType]}
      </div>
      <div style={{position:"absolute",bottom:8,left:8,fontSize:9,color:"#8a9aaa",fontFamily:"'IBM Plex Mono',monospace",background:"rgba(255,255,255,0.7)",padding:"2px 7px",borderRadius:3,pointerEvents:"none"}}>
        Sürükle: Döndür · Scroll: Yakınlaştır
      </div>
    </div>
  );
}

// ─── EXCEL EXPORT (.xlsx — SheetJS) ─────────────────────
function downloadXlsx(headers, rows, filename, sheetName) {
  if (!window.XLSX) { alert("Excel kütüphanesi yüklenemedi."); return; }
  const X = window.XLSX;
  const data = [headers, ...rows];
  const ws = X.utils.aoa_to_sheet(data);
  // Kolon genişlikleri — başlık uzunluğuna göre
  ws["!cols"] = headers.map((h, i) => {
    let max = h.length;
    rows.forEach(r => { const v = String(r[i] || ""); if (v.length > max) max = v.length; });
    return { wch: Math.min(Math.max(max + 2, 8), 30) };
  });
  const wb = X.utils.book_new();
  X.utils.book_append_sheet(wb, ws, sheetName || "Sayfa1");
  X.writeFile(wb, filename);
}
